<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jumpy Jump</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        .game-container {
            width: 100%;
            max-width: 600px;
            height: 100%;
            position: relative;
            overflow: hidden;
        }
        .game-element {
            width: 50px;
            height: 50px;
            position: absolute;
            background-color: #3498db;
            border-radius: 10px;
            transition: transform 0.1s ease;
        }
        .controls {
            display: flex;
            justify-content: space-around;
            position: absolute;
            bottom: 20px;
            width: 100%;
        }
        .control {
            width: 80px;
            height: 80px;
            background-color: #2ecc71;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            transition: background-color 0.2s ease;
        }
        .control:active {
            background-color: #27ae60;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-element"></div>
        <div class="controls">
            <div class="control" id="jump">Jump</div>
            <div class="control" id="move-left">Left</div>
            <div class="control" id="move-right">Right</div>
        </div>
    </div>
    <script>
        const jumpButton = document.getElementById('jump');
        const moveLeftButton = document.getElementById('move-left');
        const moveRightButton = document.getElementById('move-right');
        const gameElement = document.querySelector('.game-element');

        const jump = () => {
            gameElement.style.transform = 'translateY(-100px)';
            setTimeout(() => {
                gameElement.style.transform = 'translateY(0)';
            }, 300);
        };

        const moveLeft = () => {
            gameElement.style.transform += 'translateX(-50px)';
        };

        const moveRight = () => {
            gameElement.style.transform += 'translateX(50px)';
        };

        jumpButton.addEventListener('touchstart', jump);
        moveLeftButton.addEventListener('touchstart', moveLeft);
        moveRightButton.addEventListener('touchstart', moveRight);
    </script>
</body>
</html>
